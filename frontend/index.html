<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader - Premium Videos & Audio</title>
    <meta name="description"
        content="Download videos from YouTube, Instagram, TikTok in 4K or extract high-quality MP3 audio with our fast, modern downloader.">
    <meta name="referrer" content="no-referrer">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-elements">
    </div>

    <div class="container">

        <main class="glass-panel">
            <div class="input-group">
                <i class="fa-solid fa-link input-icon"></i>
                <input type="text" id="urlInput" placeholder="Paste video link here..." autocomplete="off">
                <button id="fetchBtn" class="btn btn-primary">
                    <span class="btn-text">Extract</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </div>

            <div id="errorBox" class="error-box hidden">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Error occurred</span>
            </div>

            <div id="loadingBox" class="loading-box hidden">
                <div class="spinner"></div>
                <p>Analyzing video... This might take a few seconds.</p>
            </div>

            <div id="resultBox" class="result-box hidden">
                <div class="video-preview">
                    <img id="thumbnail" src="" alt="Video Thumbnail">
                    <div class="video-info">
                        <h2 id="videoTitle">Video Title</h2>
                        <span id="videoDuration" class="badge">00:00</span>
                    </div>
                </div>

                <div class="download-section">
                    <h3 class="section-title">Select quality</h3>
                    <div id="qualityGrid" class="quality-grid">
                        <!-- Quality boxes injected via JS -->
                    </div>
                    <div class="action-buttons-row">
                        <button id="downloadVideoBtn" class="btn btn-red">
                            <i class="fa-solid fa-video"></i> Download Video
                        </button>
                        <button id="downloadAudioBtn" class="btn btn-dark">
                            <i class="fa-solid fa-music"></i> Download MP3
                        </button>
                        <button id="directDownloadBtn" class="btn btn-primary hidden">
                            <i class="fa-solid fa-bolt"></i> Fast Direct Link
                        </button>
                    </div>
                </div>
            </div>

            <div id="progressBox" class="progress-box hidden">
                <h3 id="progressStatus">Downloading...</h3>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <p id="progressPercentage">0%</p>
                <div id="downloadLinkBox" class="hidden">
                    <p class="success-text"><i class="fa-solid fa-check-circle"></i> Saving to your device!</p>
                    <button id="downloadAnotherBtn" class="btn btn-success">Download Another</button>
                </div>
            </div>
        </main>


    </div>

    <script src="/js/app.js?v=9"></script>
</body>

</html>
